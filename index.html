<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แชร์ตำแหน่งลูกค้า</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.box {
    background: #020617;
    padding: 25px;
    border-radius: 15px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,150,255,.3);
}
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
input {
    font-size: 16px;
}
button {
    font-size: 18px;
    background: linear-gradient(45deg,#3b82f6,#06b6d4);
    color: white;
    cursor: pointer;
}
button:hover { opacity: .9; }
.result {
    margin-top: 15px;
    font-size: 14px;
    word-break: break-all;
}
</style>
</head>

<body>

<div class="box">
    <h2>📍 ระบุเวลาเก็บบอดเงิน</h2>

    <input id="name" placeholder="ชื่อลูกค้า">
    <input id="phone" placeholder="เบอร์โทร">

    <button onclick="sendLocation()">ยืนยัน</button>

    <div class="result" id="result"></div>
</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1452996074485710880/j3FV0207D74ogmrm6Y4_XepEzkrOk23XTQW70wAk0q21KeOGi9EMLYI4_dLY44yJCAaz";

function sendLocation() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (!name || !phone) {
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const map = `https://www.google.com/maps?q=${lat},${lng}`;

        const payload = {
            embeds: [{
                title: "📦 ลูกค้าแชร์ตำแหน่ง",
                color: 3447003,
                fields: [
                    { name: "👤 ชื่อ", value: name, inline: true },
                    { name: "📞 เบอร์", value: phone, inline: true },
                    { name: "📍 ตำแหน่ง", value: `[เปิดแผนที่](${map})` },
                    { name: "Lat / Lng", value: `${lat}, ${lng}` }
                ],
                footer: { text: "Location System" },
                timestamp: new Date()
            }]
        };

        fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById("result").innerHTML =
                "✅ ส่งตำแหน่งเรียบร้อยแล้ว";
        });

    }, () => {
        alert("กรุณาอนุญาตการเข้าถึงตำแหน่ง");
    });
}
</script>

</body>
</html>
